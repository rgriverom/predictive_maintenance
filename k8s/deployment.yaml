apiVersion: apps/v1
kind: Deployment
metadata:
  name: rul-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rul-api
  template:
    metadata:
      labels:
        app: rul-api
    spec:
      containers:
        - name: rul-api
          image: cmapss-rul-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"